<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
<div class="card shadow-sm" style="width:100%;max-width:440px">
    <div class="card-body p-4">
        <h4 class="mb-1">Crear cuenta</h4>
        <p class="text-muted mb-4" style="font-size:.9rem">Completa el formulario para registrarte</p>
        <div id="alertMsg" class="alert alert-danger d-none py-2"></div>
        <div id="successMsg" class="alert alert-success d-none py-2">¡Cuenta creada correctamente!</div>
        <form action="/auth/register" method="POST" id="registerForm" novalidate>
            <div class="row g-3 mb-3">
                <div class="col">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" name="firstName" required>
                </div>
                <div class="col">
                    <label class="form-label">Apellido</label>
                    <input type="text" class="form-control" name="lastName" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" placeholder="usuario@correo.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" name="password" id="password" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <div class="mb-4">
                <label class="form-label">Confirmar contraseña</label>
                <input type="password" class="form-control" name="confirmPassword" id="confirmPassword" required>
                <div class="invalid-feedback">Las contraseñas no coinciden</div>
            </div>
            <button type="submit" class="btn btn-dark w-100">Registrarse</button>
        </form>
        <hr class="my-3">
        <p class="text-center text-muted mb-0" style="font-size:.875rem">
            ¿Ya tienes cuenta? <a href="/login" class="text-dark">Inicia sesión</a>
        </p>
    </div>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
        const el = document.getElementById('alertMsg');
        el.textContent = decodeURIComponent(params.get('error'));
        el.classList.remove('d-none');
    }
    if (params.get('success')) document.getElementById('successMsg').classList.remove('d-none');

    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const pwd  = document.getElementById('password').value;
        const conf = document.getElementById('confirmPassword');
        if (pwd !== conf.value) { e.preventDefault(); conf.classList.add('is-invalid'); }
    });
</script>
</body>
</html>
