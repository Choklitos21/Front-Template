<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
<div class="card shadow-sm" style="width:100%;max-width:400px">
    <div class="card-body p-4">
        <h4 class="mb-1">Iniciar sesión</h4>
        <p class="text-muted mb-4" style="font-size:.9rem">Ingresa tus credenciales</p>
        <div id="alertMsg" class="alert alert-danger d-none py-2"></div>
        <form action="/auth/login" method="POST">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" placeholder="usuario@correo.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Ingresar</button>
        </form>
        <hr class="my-3">
        <p class="text-center text-muted mb-0" style="font-size:.875rem">
            ¿No tienes cuenta? <a href="/register" class="text-dark">Regístrate</a>
        </p>
    </div>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
        const el = document.getElementById('alertMsg');
        el.textContent = decodeURIComponent(params.get('error'));
        el.classList.remove('d-none');
    }
</script>
</body>
</html>
