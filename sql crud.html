<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD — PostgreSQL</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-light bg-white border-bottom px-4">
  <span class="navbar-brand mb-0 fw-semibold">CRUD — PostgreSQL</span>
  <a href="/dashboard" class="text-muted text-decoration-none" style="font-size:.875rem">← Dashboard</a>
</nav>

<div class="container py-4" style="max-width:900px">
  <div id="toast" class="alert d-none mb-3 py-2"></div>

  <div class="card mb-4">
    <div class="card-body">
      <h6 class="card-title mb-3" id="formTitle">Nuevo registro</h6>
      <input type="hidden" id="itemId">
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" id="fieldName" placeholder="Ej: Juan Pérez">
        </div>
        <div class="col-md-4">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="fieldEmail" placeholder="correo@ejemplo.com">
        </div>
        <div class="col-md-4">
          <label class="form-label">Estado</label>
          <select class="form-select" id="fieldStatus">
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-dark btn-sm" id="btnCreate" onclick="createItem()">Crear</button>
        <button class="btn btn-secondary btn-sm d-none" id="btnUpdate" onclick="updateItem()">Actualizar</button>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadItems()">↻ Recargar</button>
        <button class="btn btn-link btn-sm text-muted" onclick="clearForm()">Cancelar</button>
      </div>
    </div>
  </div>

  <div class="mb-3 d-flex gap-2 align-items-center">
    <input type="text" class="form-control form-control-sm" style="max-width:300px" id="searchInput" placeholder="Buscar..." oninput="filterTable()">
    <span class="text-muted" style="font-size:.85rem" id="recordCount"></span>
  </div>

  <div class="card">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
        <tr><th>ID</th><th>Nombre</th><th>Email</th><th>Estado</th><th>Creado</th><th></th></tr>
        </thead>
        <tbody id="tableBody">
        <tr><td colspan="6" class="text-center text-muted py-4">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const API = '/api/sql/items';
  let allItems = [];

  async function loadItems() {
    try {
      const res = await fetch(API);
      allItems = await res.json();
      renderTable(allItems);
      document.getElementById('recordCount').textContent = allItems.length + ' registros';
    } catch {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" class="text-center text-danger py-3">Error al cargar datos</td></tr>';
    }
  }

  function renderTable(items) {
    const body = document.getElementById('tableBody');
    if (!items.length) { body.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">Sin registros</td></tr>'; return; }
    body.innerHTML = items.map(item => `
        <tr>
          <td class="text-muted" style="font-size:.85rem">${item.id}</td>
          <td>${esc(item.name)}</td>
          <td class="text-muted">${esc(item.email || '—')}</td>
          <td><span class="badge ${item.status === 'activo' ? 'bg-success' : 'bg-secondary'}">${item.status}</span></td>
          <td class="text-muted" style="font-size:.85rem">${item.created_at ? new Date(item.created_at).toLocaleDateString('es') : '—'}</td>
          <td>
            <button class="btn btn-link btn-sm p-0 me-2 text-dark" onclick="editItem(${item.id})">Editar</button>
            <button class="btn btn-link btn-sm p-0 text-danger" onclick="deleteItem(${item.id})">Eliminar</button>
          </td>
        </tr>`).join('');
  }

  async function createItem() {
    const body = { name: document.getElementById('fieldName').value.trim(), email: document.getElementById('fieldEmail').value.trim(), status: document.getElementById('fieldStatus').value };
    if (!body.name) return showToast('El nombre es requerido', 'danger');
    try {
      const res = await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (!res.ok) throw new Error();
      showToast('Registro creado', 'success'); clearForm(); loadItems();
    } catch { showToast('Error al crear', 'danger'); }
  }

  function editItem(id) {
    const item = allItems.find(i => i.id === id);
    if (!item) return;
    document.getElementById('itemId').value = id;
    document.getElementById('fieldName').value = item.name;
    document.getElementById('fieldEmail').value = item.email || '';
    document.getElementById('fieldStatus').value = item.status;
    document.getElementById('btnCreate').classList.add('d-none');
    document.getElementById('btnUpdate').classList.remove('d-none');
    document.getElementById('formTitle').textContent = 'Editando #' + id;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function updateItem() {
    const id = document.getElementById('itemId').value;
    const body = { name: document.getElementById('fieldName').value.trim(), email: document.getElementById('fieldEmail').value.trim(), status: document.getElementById('fieldStatus').value };
    try {
      const res = await fetch(`${API}/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (!res.ok) throw new Error();
      showToast('Actualizado', 'success'); clearForm(); loadItems();
    } catch { showToast('Error al actualizar', 'danger'); }
  }

  async function deleteItem(id) {
    if (!confirm('¿Eliminar este registro?')) return;
    try {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      showToast('Eliminado', 'secondary'); loadItems();
    } catch { showToast('Error al eliminar', 'danger'); }
  }

  function clearForm() {
    document.getElementById('itemId').value = '';
    document.getElementById('fieldName').value = '';
    document.getElementById('fieldEmail').value = '';
    document.getElementById('fieldStatus').value = 'activo';
    document.getElementById('btnCreate').classList.remove('d-none');
    document.getElementById('btnUpdate').classList.add('d-none');
    document.getElementById('formTitle').textContent = 'Nuevo registro';
  }

  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allItems.filter(i => i.name?.toLowerCase().includes(q) || i.email?.toLowerCase().includes(q));
    renderTable(filtered);
    document.getElementById('recordCount').textContent = `${filtered.length} / ${allItems.length} registros`;
  }

  function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.className = `alert alert-${type} py-2`;
    el.textContent = msg;
    el.classList.remove('d-none');
    setTimeout(() => el.classList.add('d-none'), 3000);
  }

  function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  loadItems();
</script>
</body>
</html>
